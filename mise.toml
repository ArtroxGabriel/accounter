[tools]
go = "1.26.0"
golangci-lint = "latest"

[vars]
app_name = "accounter"
docker_image = "accounter:latest"

[tasks.start]
run = "go run ./cmd/app"
description = "Run the application"

[tasks.build]
run = "go build -v -o {{vars.app_name}} ./cmd/app"
description = "Build the binary"

[tasks.test]
run = "go test ./... -race"
description = "Run unit tests"

[tasks."test:integration"]
run = "go test ./... -race -tags=integration"
description = "Run integration tests"

[tasks."test:coverage"]
run = [
    "mkdir -p coverage",
    "go test ./... -race -tags=integration -coverprofile=./coverage/coverage.out",
    "go tool cover -html=./coverage/coverage.out -o ./coverage/coverage.html",
]
description = "Run all tests with coverage and integration tags"

[tasks.lint]
run = "golangci-lint run"
description = "Run linter"

[tasks.fmt]
run = ["golangci-lint fmt", "go vet ./..."]
description = "Format code and run vet"

[tasks.clean]
run = "rm -rf bin/ coverage.out coverage.html accounter"
description = "Clean build artifacts"

[tasks.tidy]
run = "go mod tidy"
description = "Tidy dependencies"

[tasks.docker-build]
run = "docker build -t {{vars.docker_image}} ."
description = "Build Docker image"

[tasks.docker-run]
run = "docker run --rm -p 8080:8080 --env-file .env {{vars.docker_image}}"
description = "Run Docker container locally"
