<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} — Accounter</title>
    
    <!-- Rich Aesthetics: Inter & Outfit Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Modern Styling: Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            50: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                    }
                }
            }
        }
    </script>
    
    <!-- Dynamic UX: HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="h-full font-sans antialiased gradient-bg">
    <div class="min-h-full flex flex-col">
        <!-- Navigation -->
        <nav class="glass sticky top-0 z-50 px-6 py-4">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl bg-primary-600 flex items-center justify-center shadow-lg shadow-primary-500/20">
                        <span class="text-2xl">💰</span>
                    </div>
                    <span class="text-xl font-bold font-outfit tracking-tight">Accounter</span>
                </div>
                
                <div class="flex items-center gap-6">
                    <a href="/dashboard" class="text-sm font-medium hover:text-primary-400 transition-colors">Dashboard</a>
                    <a href="#" class="text-sm font-medium opacity-50 cursor-not-allowed">Settings</a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-8">
            {{ template "content" . }}
        </main>

        <!-- Footer -->
        <footer class="mt-auto px-6 py-8 border-t border-slate-800/50">
            <div class="max-w-7xl mx-auto text-center text-slate-500 text-xs font-medium uppercase tracking-widest">
                Built with Golang + HTMX + Tailwind
            </div>
        </footer>
    </div>

    <!-- Notification system for HTMX calls -->
    <div id="notifications" class="fixed bottom-6 right-6 z-[60]"></div>

    <script>
        document.body.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.xhr.status === 401) {
                window.location.reload(); // Simple re-auth handling if needed
            }
        });
    </script>
</body>
</html>
