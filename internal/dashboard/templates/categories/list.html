{{ define "category-list" }}
    {{ range .Categories }}
        <div id="category-{{ .ID }}" class="group flex items-center justify-between p-3 bg-slate-800/30 rounded-xl hover:bg-slate-800/60 transition-all cursor-default">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center text-xl shadow-inner">
                    {{ .Icon }}
                </div>
                <span class="font-bold text-slate-200 tracking-tight">{{ .Name }}</span>
            </div>
            
            <!-- Context Menu (Optional/Simplified) -->
            <button class="opacity-0 group-hover:opacity-100 p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg text-slate-500 transition-all"
                    hx-delete="/dashboard/categories/{{ .ID }}" 
                    hx-swap="delete" 
                    hx-target="#category-{{ .ID }}" 
                    hx-confirm="Delete category '{{ .Name }}'? This will fail if there are expenses attached.">
                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
            </button>
        </div>
    {{ else }}
        <p class="text-xs text-slate-500 text-center py-4">No categories found.</p>
    {{ end }}
{{ end }}

{{ define "category-form" }}
<form hx-post="/dashboard/categories" hx-target="#categories-list" hx-swap="afterbegin" hx-on="htmx:afterRequest: this.remove()" class="p-4 bg-primary-600/10 border border-primary-500/20 rounded-2xl animate-fade-in space-y-4">
    <div class="flex items-center gap-3">
        <input type="text" name="icon" value="📦" maxlength="2" required 
               class="w-12 h-12 glass text-center text-2xl rounded-xl outline-none focus:ring-2 focus:ring-primary-500">
        <input type="text" name="name" placeholder="Category Name" required autofocus
               class="flex-grow glass px-4 py-3 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-primary-500">
    </div>
    <div class="flex items-center gap-2">
        <button type="submit" class="flex-grow bg-primary-600 hover:bg-primary-500 text-white text-xs font-bold py-2 rounded-lg transition-colors">Add</button>
        <button type="button" @click="this.closest('form').remove()" class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-xs font-bold rounded-lg transition">Cancel</button>
    </div>
</form>
{{ end }}
