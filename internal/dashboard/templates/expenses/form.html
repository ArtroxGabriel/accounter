{{ define "expense-form" }}
<form hx-post="/dashboard/expenses" 
      hx-target="#expense-table-body" 
      hx-swap="afterbegin" 
      hx-on="htmx:afterRequest: this.reset()" 
      class="grid grid-cols-1 md:grid-cols-2 gap-6">
    
    <div class="space-y-2">
        <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Amount</label>
        <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold font-outfit">R$</span>
            <input type="number" name="amount" step="0.01" required 
                   placeholder="0,00"
                   class="glass w-full pl-12 pr-4 py-3 rounded-xl text-lg font-bold font-outfit outline-none focus:ring-2 focus:ring-primary-500 transition-shadow">
        </div>
    </div>

    <div class="space-y-2">
        <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Category</label>
        <div class="relative">
            <select name="category_id" required 
                    class="appearance-none glass w-full pl-4 pr-10 py-3 rounded-xl text-md font-medium outline-none focus:ring-2 focus:ring-primary-500 transition-shadow">
                {{ range .Categories }}
                    <option value="{{ .ID }}">{{ .Icon }} {{ .Name }}</option>
                {{ end }}
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </div>
    </div>

    <div class="space-y-2 md:col-span-1">
        <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Description</label>
        <input type="text" name="description" placeholder="What's this for?" 
               class="glass w-full px-4 py-3 rounded-xl text-md font-medium outline-none focus:ring-2 focus:ring-primary-500 transition-shadow">
    </div>

    <div class="space-y-2 md:col-span-1">
        <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Date</label>
        <input type="date" name="date" 
               class="glass w-full px-4 py-3 rounded-xl text-md font-medium outline-none focus:ring-2 focus:ring-primary-500 transition-shadow">
    </div>

    <div class="md:col-span-2 pt-4">
        <button type="submit" class="w-full bg-primary-600 hover:bg-primary-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary-600/20 transition-all flex items-center justify-center gap-2 group">
            <span class="font-outfit text-lg tracking-wide">Record Expense</span>
            <svg class="h-5 w-5 translate-x-0 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </button>
    </div>
</form>
{{ end }}
