{{ define "content" }}
<div class="space-y-12 animate-fade-in">
    <!-- Header -->
    <div class="flex items-end justify-between">
        <div>
            <h1 class="text-3xl font-bold font-outfit gradient-text">Dashboard</h1>
            <p class="text-slate-400 font-medium">Hello, here's your spending summary.</p>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="loading" class="htmx-indicator animate-spin rounded-full h-8 w-8 border-t-2 border-primary-500"></div>
            
            <!-- Period Filters -->
            <form id="filters" class="flex items-center gap-2" hx-get="/dashboard/expenses" hx-target="#expense-list" hx-indicator="#loading">
                <select name="period" class="glass rounded-lg px-4 py-2 text-sm font-medium focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month" selected>This Month</option>
                    <option value="year">This Year</option>
                    <option value="all">All Time</option>
                </select>
            </form>
        </div>
    </div>

    <!-- Summary Cards -->
    <div id="summary" class="grid grid-cols-1 md:grid-cols-3 gap-6" hx-get="/dashboard/summary" hx-trigger="load, expense-updated from:body" hx-target="this">
        <!-- Summary cards will be loaded here via HTMX -->
        <div class="col-span-full h-32 glass flex items-center justify-center animate-pulse rounded-2xl">
            <span class="text-slate-500 font-medium text-sm">Calculating your impact...</span>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Left: Expense Form & List -->
        <div class="lg:col-span-2 space-y-8">
            <!-- Add Expense Section -->
            <section class="glass rounded-3xl p-8 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold font-outfit">Log Expense</h2>
                    <span class="text-2xl">💸</span>
                </div>
                {{ template "expense-form" . }}
            </section>

            <!-- Expense List Section -->
            <section class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold font-outfit">History</h2>
                </div>
                <div id="expense-list" class="glass rounded-3xl overflow-hidden min-h-[400px]" hx-get="/dashboard/expenses" hx-trigger="load, expense-updated from:body" hx-target="this">
                    <div class="flex items-center justify-center h-full p-8 text-slate-500 font-medium text-sm animate-pulse">
                        Sifting through receipts...
                    </div>
                </div>
            </section>
        </div>

        <!-- Right: Category Management -->
        <aside class="space-y-8">
            <section class="glass rounded-3xl p-8 space-y-6 h-fit sticky top-24">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold font-outfit">Categories</h2>
                    <button class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition" hx-get="/dashboard/categories/add" hx-target="#categories-list" hx-swap="afterbegin">
                        <span class="text-white">+</span>
                    </button>
                </div>
                
                <div id="categories-list" class="space-y-3" hx-get="/dashboard/categories" hx-trigger="load" hx-target="this">
                    <div class="animate-pulse flex items-center gap-2 p-3 bg-slate-800/50 rounded-xl">
                        <div class="w-8 h-8 rounded-lg bg-slate-700"></div>
                        <div class="h-4 bg-slate-700 rounded-full w-24"></div>
                    </div>
                </div>
            </section>
        </aside>
    </div>
</div>
{{ end }}
