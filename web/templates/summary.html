{{ define "summary" }}
<div class="col-span-1 glass p-8 rounded-3xl space-y-2 border-l-4 border-primary-500 shadow-xl shadow-primary-500/5">
    <div class="flex items-center justify-between">
        <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Total Spent</span>
        <span class="text-2xl">📉</span>
    </div>
    <div class="text-3xl font-bold font-outfit text-white tracking-tight">{{ .Total }}</div>
</div>

<div class="col-span-1 glass p-8 rounded-3xl space-y-2 border-l-4 border-indigo-500 shadow-xl shadow-indigo-500/5">
    <div class="flex items-center justify-between">
        <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Receipts Found</span>
        <span class="text-2xl">🧾</span>
    </div>
    <div class="text-3xl font-bold font-outfit text-white tracking-tight">{{ .ExpenseCount }}</div>
</div>

<div class="col-span-1 glass p-8 rounded-3xl space-y-2 border-l-4 border-emerald-500 shadow-xl shadow-emerald-500/5">
    <div class="flex items-center justify-between">
        <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Active Categories</span>
        <span class="text-2xl">🏷️</span>
    </div>
    <div class="text-3xl font-bold font-outfit text-white tracking-tight">{{ len .Categories }}</div>
</div>
{{ end }}
